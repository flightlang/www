---
layout: default
---
<header class="hero">
  <div class="container">
    {% if page.badge %}<span class="badge">{{ page.badge }}</span>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </div>
</header>

<main class="section">
  <div class="container content">
    {{ content }}
  </div>
</main>
