---
layout: default
---
<header class="hero">
  <div class="container post-hero">
    <span class="badge">{{ page.date | date: "%B %-d, %Y" }}</span>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="lead">{{ page.description }}</p>{% endif %}
  </div>
</header>

<main class="section">
  <article class="container article-shell">
    <div class="card article-card">
      {{ content }}
    </div>
  </article>
</main>
